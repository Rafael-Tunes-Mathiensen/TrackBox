<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Conta - TrackBox</title>
    <link rel="stylesheet" href="assets/css/register.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="register-container">
        <div class="logo-container">
            <h1>TrackBox</h1>
            <p>Crie sua conta</p>
        </div>

        <div id="alertContainer"></div>

        <form id="registerForm">
            <div class="form-group">
                <label class="form-label" for="name">Nome Completo</label>
                <input type="text" id="name" class="form-input" placeholder="Digite seu nome completo" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">E-mail</label>
                <input type="email" id="email" class="form-input" placeholder="seu@email.com" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Senha</label>
                <input type="password" id="password" class="form-input" placeholder="Crie uma senha forte" required>
                <div class="password-strength">
                    <div class="strength-bar">
                        <div id="strengthFill" class="strength-fill"></div>
                    </div>
                    <span id="strengthText"></span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirmPassword">Confirmar Senha</label>
                <input type="password" id="confirmPassword" class="form-input" placeholder="Digite a senha novamente" required>
            </div>

            <button type="submit" class="btn btn-primary">Criar Conta</button>
        </form>

        <div class="divider">ou</div>

        <div class="link-text">
            Já tem uma conta? <a href="login.html">Fazer login</a>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');
        const alertContainer = document.getElementById('alertContainer');

        // Verificar força da senha
        passwordInput.addEventListener('input', (e) => {
            const password = e.target.value;
            const strength = checkPasswordStrength(password);
            
            strengthFill.className = 'strength-fill';
            
            if (strength.score === 0) {
                strengthText.textContent = '';
            } else if (strength.score <= 2) {
                strengthFill.classList.add('strength-weak');
                strengthText.textContent = 'Senha fraca';
                strengthText.style.color = '#E64C4C';
            } else if (strength.score === 3) {
                strengthFill.classList.add('strength-medium');
                strengthText.textContent = 'Senha média';
                strengthText.style.color = '#E6B44C';
            } else {
                strengthFill.classList.add('strength-strong');
                strengthText.textContent = 'Senha forte';
                strengthText.style.color = '#4CE67E';
            }
        });

        function checkPasswordStrength(password) {
            let score = 0;
            
            if (password.length >= 8) score++;
            if (password.length >= 12) score++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score++;
            if (/\d/.test(password)) score++;
            if (/[^a-zA-Z\d]/.test(password)) score++;
            
            return { score };
        }

        function showAlert(message, type) {
            alertContainer.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 5000);
        }

        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validações
            if (password !== confirmPassword) {
                showAlert('As senhas não coincidem!', 'error');
                return;
            }
            
            if (password.length < 6) {
                showAlert('A senha deve ter pelo menos 6 caracteres!', 'error');
                return;
            }
            
            // Simular salvamento (em produção, fazer requisição ao backend)
            const users = JSON.parse(localStorage.getItem('trackbox_users') || '[]');
            
            // Verificar se email já existe
            if (users.find(u => u.email === email)) {
                showAlert('Este e-mail já está cadastrado!', 'error');
                return;
            }
            
            // Adicionar novo usuário
            users.push({
                id: Date.now(),
                name,
                email,
                password, // Em produção, usar hash
                createdAt: new Date().toISOString()
            });
            
            localStorage.setItem('trackbox_users', JSON.stringify(users));
            
            showAlert('Conta criada com sucesso! Redirecionando...', 'success');
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        });
    </script>
</body>
</html>
