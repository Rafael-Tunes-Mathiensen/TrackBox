<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TrackBox</title>
    <link rel="stylesheet" href="assets/css/auth.css">
    <link rel="icon" type="image/x-icon" href="assets/img/TrackBox.ico">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-background">
        <div class="vinyl-animation">
            <div class="vinyl vinyl-1"></div>
            <div class="vinyl vinyl-2"></div>
            <div class="vinyl vinyl-3"></div>
        </div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-container">
                <img src="assets/img/TrackBoxLogo.png" alt="TrackBox Logo" class="logo-img">
                <div class="logo-text">
                    <h1>TrackBox</h1>
                    <p>Entre na sua conta</p>
                </div>
            </div>

            <div id="alertContainer"></div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label class="form-label" for="email">
                        <i class="fas fa-envelope"></i>
                        E-mail
                    </label>
                    <input type="email" id="email" class="form-input" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">
                        <i class="fas fa-lock"></i>
                        Senha
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="Digite sua senha" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-footer">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember">
                        <span class="checkmark"></span>
                        <span>Lembrar-me</span>
                    </label>
                    <a href="#" class="forgot-link">
                        <i class="fas fa-question-circle"></i>
                        Esqueceu a senha?
                    </a>
                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt"></i>
                    Entrar
                </button>
            </form>

            <div class="divider">
                <span>ou</span>
            </div>

            <div class="link-text">
                Não tem uma conta? 
                <a href="register.html">
                    <i class="fas fa-user-plus"></i>
                    Cadastre-se
                </a>
            </div>

            <div class="home-link">
                <a href="index.html">
                    <i class="fas fa-arrow-left"></i>
                    Voltar para o início
                </a>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.parentElement.querySelector('.password-toggle i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        const loginForm = document.getElementById('loginForm');
        const alertContainer = document.getElementById('alertContainer');

        function showAlert(message, type) {
            const alertHTML = `
                <div class="alert alert-${type}">
                    <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-triangle'}"></i>
                    <span>${message}</span>
                </div>
            `;
            alertContainer.innerHTML = alertHTML;
            
            // Auto-hide alert
            setTimeout(() => {
                const alert = alertContainer.querySelector('.alert');
                if (alert) {
                    alert.style.opacity = '0';
                    alert.style.transform = 'translateY(-10px)';
                    setTimeout(() => {
                        alertContainer.innerHTML = '';
                    }, 300);
                }
            }, 5000);
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            // Show loading state
            const submitBtn = loginForm.querySelector('.btn-primary');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';
            submitBtn.disabled = true;
            
            // Simulate API delay
            setTimeout(() => {
                // Buscar usuários (em produção, fazer requisição ao backend)
                const users = JSON.parse(localStorage.getItem('trackbox_users') || '[]');
                
                // Verificar credenciais
                const user = users.find(u => u.email === email && u.password === password);
                
                if (user) {
                    // Salvar sessão
                    const session = {
                        userId: user.id,
                        name: user.name,
                        email: user.email,
                        loggedAt: new Date().toISOString()
                    };
                    
                    if (remember) {
                        localStorage.setItem('trackbox_session', JSON.stringify(session));
                    } else {
                        sessionStorage.setItem('trackbox_session', JSON.stringify(session));
                    }
                    
                    showAlert('Login realizado com sucesso! Redirecionando...', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'colecao.html';
                    }, 1500);
                } else {
                    showAlert('E-mail ou senha incorretos!', 'error');
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            }, 1000);
        });

        // Verificar se já está logado
        window.addEventListener('load', () => {
            const session = localStorage.getItem('trackbox_session') || sessionStorage.getItem('trackbox_session');
            if (session) {
                window.location.href = 'colecao.html';
            }
        });

        // Add floating animation to form elements
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('focused');
            });
            
            input.addEventListener('blur', function() {
                if (!this.value) {
                    this.parentElement.classList.remove('focused');
                }
            });
        });
    </script>
</body>
</html>
