<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TrackBox</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #9E4CE6;
            --color-secondary: #8F5DBB;
            --color-dark: #1E0138;
            --color-background: #36303C;
            --color-text: #5E5566;
            --color-light: #f5f5f5;
            --color-white: #ffffff;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--color-dark) 0%, var(--color-background) 100%);
            color: var(--color-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-container {
            background: rgba(30, 1, 56, 0.5);
            border: 1px solid rgba(158, 76, 230, 0.2);
            border-radius: 20px;
            padding: 3rem;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-container h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-container p {
            color: var(--color-secondary);
            margin-top: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--color-secondary);
            font-weight: 500;
            font-size: 0.95rem;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem;
            background: rgba(54, 48, 60, 0.8);
            border: 1px solid rgba(158, 76, 230, 0.3);
            border-radius: 8px;
            color: var(--color-light);
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(158, 76, 230, 0.1);
        }

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--color-light);
            font-size: 0.9rem;
        }

        .checkbox-label input[type="checkbox"] {
            accent-color: var(--color-primary);
        }

        .forgot-link {
            color: var(--color-primary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .forgot-link:hover {
            color: var(--color-secondary);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: var(--transition);
            display: inline-block;
            cursor: pointer;
            border: none;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            color: var(--color-white);
            box-shadow: 0 4px 15px rgba(158, 76, 230, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(158, 76, 230, 0.5);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            text-align: center;
            margin: 1.5rem 0;
            color: var(--color-secondary);
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: rgba(158, 76, 230, 0.2);
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .link-text {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--color-light);
        }

        .link-text a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .link-text a:hover {
            color: var(--color-secondary);
        }

        .home-link {
            text-align: center;
            margin-top: 1rem;
        }

        .home-link a {
            color: var(--color-light);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .home-link a:hover {
            color: var(--color-primary);
        }

        .alert {
            padding: 0.875rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .alert-success {
            background: rgba(76, 230, 126, 0.1);
            border: 1px solid rgba(76, 230, 126, 0.3);
            color: #4CE67E;
        }

        .alert-error {
            background: rgba(230, 76, 76, 0.1);
            border: 1px solid rgba(230, 76, 76, 0.3);
            color: #E64C4C;
        }

        @media (max-width: 768px) {
            .login-container {
                padding: 2rem;
            }

            .form-footer {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-container">
            <h1>TrackBox</h1>
            <p>Entre na sua conta</p>
        </div>

        <div id="alertContainer"></div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="email">E-mail</label>
                <input type="email" id="email" class="form-input" placeholder="seu@email.com" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Senha</label>
                <input type="password" id="password" class="form-input" placeholder="Digite sua senha" required>
            </div>

            <div class="form-footer">
                <label class="checkbox-label">
                    <input type="checkbox" id="remember">
                    <span>Lembrar-me</span>
                </label>
                <a href="#" class="forgot-link">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="btn btn-primary">Entrar</button>
        </form>

        <div class="divider">ou</div>

        <div class="link-text">
            Não tem uma conta? <a href="register.html">Cadastre-se</a>
        </div>

        <div class="home-link">
            <a href="index.html">← Voltar para o início</a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const alertContainer = document.getElementById('alertContainer');

        function showAlert(message, type) {
            alertContainer.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 5000);
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            // Buscar usuários (em produção, fazer requisição ao backend)
            const users = JSON.parse(localStorage.getItem('trackbox_users') || '[]');
            
            // Verificar credenciais
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                // Salvar sessão
                const session = {
                    userId: user.id,
                    name: user.name,
                    email: user.email,
                    loggedAt: new Date().toISOString()
                };
                
                if (remember) {
                    localStorage.setItem('trackbox_session', JSON.stringify(session));
                } else {
                    sessionStorage.setItem('trackbox_session', JSON.stringify(session));
                }
                
                showAlert('Login realizado com sucesso! Redirecionando...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'colecao.html';
                }, 1500);
            } else {
                showAlert('E-mail ou senha incorretos!', 'error');
            }
        });

        // Verificar se já está logado
        window.addEventListener('load', () => {
            const session = localStorage.getItem('trackbox_session') || sessionStorage.getItem('trackbox_session');
            if (session) {
                window.location.href = 'colecao.html';
            }
        });
    </script>
</body>
</html>
